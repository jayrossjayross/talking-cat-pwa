name: Validate Mochi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build PWA
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Validate backend syntax
        run: python -m py_compile api/index.py api/realtime.py

  report:
    name: Report validation status
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Report validation success
        if: needs.build.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api --method POST
          repos/${{ github.repository }}/statuses/${{ github.sha }}
          -f state=success
          -f context='Validate Mochi'
          -f description='Frontend and backend validation passed'

      - name: Report validation failure
        if: needs.build.result != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api --method POST
          repos/${{ github.repository }}/statuses/${{ github.sha }}
          -f state=failure
          -f context='Validate Mochi'
          -f description='Frontend or backend validation failed'
