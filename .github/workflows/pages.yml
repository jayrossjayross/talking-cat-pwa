name: Deploy Mochi to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build PWA
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    name: Report deployment status
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment success
        if: needs.build.result == 'success' && needs.deploy.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api --method POST
          repos/${{ github.repository }}/statuses/${{ github.sha }}
          -f state=success
          -f context='Deploy Mochi to GitHub Pages'
          -f description='GitHub Pages deployment passed'

      - name: Report deployment failure
        if: needs.build.result != 'success' || needs.deploy.result != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api --method POST
          repos/${{ github.repository }}/statuses/${{ github.sha }}
          -f state=failure
          -f context='Deploy Mochi to GitHub Pages'
          -f description='GitHub Pages deployment failed'
